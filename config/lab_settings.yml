---
# ==============================================================================
# Central Lab Settings
# Project: Linux/Ubuntu Lab Management Toolkit
# ==============================================================================
#
# Purpose:
#   This file controls normal lab-management settings used by the Ansible
#   playbooks.
#
# Main idea:
#   inventory.ini controls WHICH computers are managed.
#   config/lab_settings.yml controls WHAT settings the playbooks use.
#   shared_materials/ contains WHAT files are copied.
#   ./labmanage is HOW the professor runs the system.
#
# Safe to commit:
#   Yes, but only while this file contains generic, non-secret settings.
#
# Do NOT put here:
#   - plaintext passwords
#   - real SSH private keys
#   - real IP addresses
#   - private hostnames
#   - student personal data
#   - secret tokens
#   - production credentials
#
# Important security note:
#   lab_admin_password_hash must normally stay empty in the committed version.
#   If a real password hash is needed, prefer a private inventory variable,
#   Ansible Vault, or another non-committed configuration method.
#
# ==============================================================================


# ------------------------------------------------------------------------------
# Software packages
# Used by:
#   playbooks/04_install_required_software.yml
#
# Add or remove Ubuntu package names here.
#
# Example:
#   To install LibreOffice, add:
#     - libreoffice
#
# Safety:
#   - Use official Ubuntu package names.
#   - Test on one PC first before installing on all lab computers.
#   - Avoid adding heavy or unnecessary packages without professor approval.
# ------------------------------------------------------------------------------

required_packages:
  - vim
  - git
  - curl
  - wget
  - python3
  - python3-pip
  - htop
  - tree


# ------------------------------------------------------------------------------
# System update behavior
# Used by:
#   playbooks/03_update_system.yml
#
# update_package_cache:
#   Refreshes the Ubuntu APT package list.
#
# upgrade_system_packages:
#   Upgrades installed packages when updates are available.
#
# autoremove_unused_packages:
#   Removes packages that Ubuntu says are no longer needed.
#   Default is false for extra safety.
#
# apt_cache_valid_time_seconds:
#   Avoids refreshing the package cache again if it was recently updated.
#
# Safety:
#   - Test updates on one PC first.
#   - Do not run during active class time.
#   - Reboot is handled separately by playbook 07.
# ------------------------------------------------------------------------------

update_package_cache: true
upgrade_system_packages: true
autoremove_unused_packages: false
apt_cache_valid_time_seconds: 3600


# ------------------------------------------------------------------------------
# Shared teaching materials
# Used by:
#   playbooks/05_copy_shared_materials.yml
#
# How it works:
#   1. Put approved teaching files into shared_materials/
#   2. Run ./labmanage
#   3. Choose "Copy shared materials"
#
# Destination logic:
#   Materials go to:
#     1. lab_student_user from inventory.ini, when set
#     2. lab_student_user_default from this file
#     3. ansible_user as compatibility fallback
#
# Example hardened inventory:
#   pc1 ansible_host=192.168.x.x ansible_user=labadmin lab_student_user=student123
#
# In that case:
#   - Ansible connects as labadmin.
#   - Teaching materials are copied to /home/student123/Lab_Materials.
#
# Safety:
#   - Only files inside shared_materials/ are copied.
#   - This does not share the whole teacher/control computer.
#   - This should not overwrite unrelated student home directories.
# ------------------------------------------------------------------------------

shared_materials_source: "shared_materials/"
shared_materials_destination: "/home/{{ lab_student_user | default(lab_student_user_default | default(ansible_user | default('student'), true), true) }}/Lab_Materials"
shared_materials_owner: "{{ lab_student_user | default(lab_student_user_default | default(ansible_user | default('student'), true), true) }}"
shared_materials_group: "{{ lab_student_user | default(lab_student_user_default | default(ansible_user | default('student'), true), true) }}"
shared_materials_directory_mode: "0755"
shared_materials_file_mode: "0644"


# ------------------------------------------------------------------------------
# User privilege management
# Used by:
#   playbooks/08_setup_labadmin_user.yml
#   playbooks/09_check_user_privileges.yml
#   playbooks/10_revoke_student_sudo.yml
#   playbooks/11_grant_student_sudo.yml
#
# Security model:
#   lab_admin_user:
#     Administrator account used by the professor/Ansible.
#     This account should have sudo access.
#
#   lab_student_user_default:
#     Default classroom account used by students.
#     This account should normally NOT have sudo after hardening.
#
#   sudo_group_name:
#     Ubuntu normally uses the "sudo" group for administrator privileges.
#
#   lab_admin_password_hash:
#     Optional password hash for lab_admin_user.
#     Leave empty unless you intentionally want the setup playbook to set the
#     labadmin password.
#
#   lab_admin_public_key_file:
#     Optional public-key path on the professor/control PC.
#     Leave empty to prefer:
#       1. ~/.ssh/id_ed25519.pub
#       2. ~/.ssh/id_rsa.pub
#
# Safety:
#   - Never store plaintext passwords here.
#   - Never configure an SSH private key path here.
#   - Keep labadmin and the student account separate.
#   - Test on one PC before applying to the full lab.
# ------------------------------------------------------------------------------

lab_admin_user: "labadmin"
lab_student_user_default: "student123"
sudo_group_name: "sudo"

# Keep this empty in the committed version.
# If used, it must be a real password hash, for example generated with:
#   openssl passwd -6
lab_admin_password_hash: ""

# Optional public key override. Must point to a .pub file, not a private key.
lab_admin_public_key_file: ""


# ------------------------------------------------------------------------------
# Student auto-login management
# Used by:
#   playbooks/12_configure_student_autologin.yml
#   playbooks/13_disable_student_autologin.yml
#
# student_autologin_enabled:
#   Controls whether playbook 12 is allowed to enable auto-login.
#
# student_autologin_display_manager:
#   Supported values:
#     auto    - detect GDM3 or LightDM automatically
#     gdm3    - force GDM3 configuration
#     lightdm - force LightDM configuration
#
# student_autologin_reboot_after_change:
#   false:
#     Do not reboot automatically. Recommended default.
#
#   true:
#     Reboot automatically only after an auto-login configuration change.
#
# Safety:
#   - Auto-login must target the classroom student account.
#   - Auto-login must never target labadmin.
#   - Auto-login does not store or use a password.
#   - Auto-login does not grant sudo.
#   - Revoke student sudo before enabling auto-login.
#   - Physical verification after reboot/logout is still required.
# ------------------------------------------------------------------------------

student_autologin_enabled: true
student_autologin_display_manager: "auto"
student_autologin_reboot_after_change: false


# ------------------------------------------------------------------------------
# Preflight thresholds
# Used by:
#   playbooks/00_preflight_check.yml
#
# minimum_free_disk_gb:
#   Minimum free disk space expected on student PCs.
#
# minimum_memory_mb_warning:
#   Show a warning if memory is below this value.
# ------------------------------------------------------------------------------

minimum_free_disk_gb: 2
minimum_memory_mb_warning: 2048


# ------------------------------------------------------------------------------
# Cleanup behavior
# Used by:
#   playbooks/06_clean_lab_computers.yml
#
# clean_package_cache:
#   Cleans downloaded APT package cache.
#
# clean_apt_autoremove:
#   Removes unused packages if enabled in the cleanup playbook.
#
# clean_temp_files:
#   Removes old temporary files only if enabled.
#   Default is false for safety.
#
# clean_temp_files_older_than:
#   Only used if clean_temp_files is true.
#   Keep this conservative.
#
# Safety:
#   - Cleanup should never delete student home directories.
#   - Cleanup should never delete student documents.
#   - Cleanup should not remove teaching materials.
# ------------------------------------------------------------------------------

clean_package_cache: true
clean_apt_autoremove: true
clean_temp_files: false
clean_temp_files_older_than: "7d"


# ------------------------------------------------------------------------------
# Reboot behavior
# Used by:
#   playbooks/07_reboot_if_required.yml
#
# reboot_timeout_seconds:
#   Maximum time to wait for a PC to reboot and reconnect.
#
# Safety:
#   This does not make reboot automatic in the menu.
#   The menu still asks for strong confirmation.
#
# The reboot playbook should reboot only when Ubuntu creates:
#   /var/run/reboot-required
# ------------------------------------------------------------------------------

reboot_timeout_seconds: 600