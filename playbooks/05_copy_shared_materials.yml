---
# =============================================================================
# Playbook: 05_copy_shared_materials.yml
# Project: Linux/Ubuntu Lab Management Toolkit
#
# Purpose:
#   Copy teaching materials, scripts, assignments, or other shared resources
#   from the Ansible control node to all student computers.
#
# Safety:
#   - Requires sudo privileges.
#   - Only copies files from the configured shared materials directory.
#   - Existing files may be updated if they have changed.
#   - No system files are modified.
#   - Does NOT delete existing files on student computers.
#   - Does NOT reboot computers.
#   - Test on one PC first before copying to the full lab.
#
# Before running:
#   1. Place the files you want to distribute into:
#
#        shared_materials/
#
#   2. Test on one PC:
#
#        ansible-playbook -i inventory.ini \
#          playbooks/05_copy_shared_materials.yml --limit pc1
#
#   3. Verify the files appear correctly.
#
#   4. Run on the remaining computers.
#
# Example:
#   ansible-playbook -i inventory.ini playbooks/05_copy_shared_materials.yml
# =============================================================================

- name: Copy shared teaching materials
  hosts: students
  become: true
  gather_facts: false

  vars_files:
    - ../config/lab_settings.yml

  tasks:
    - name: Ensure destination directory exists
      ansible.builtin.file:
        path: "{{ shared_materials_destination }}"
        state: directory
        owner: "{{ shared_materials_owner }}"
        group: "{{ shared_materials_group }}"
        mode: "{{ shared_materials_directory_mode }}"

    - name: Copy shared teaching materials
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../{{ shared_materials_source }}"
        dest: "{{ shared_materials_destination }}/"
        owner: "{{ shared_materials_owner }}"
        group: "{{ shared_materials_group }}"
        mode: "{{ shared_materials_file_mode }}"
        directory_mode: "{{ shared_materials_directory_mode }}"

    - name: Display deployment summary
      ansible.builtin.debug:
        msg:
          - "Teaching materials copied successfully."
          - "Host: {{ inventory_hostname }}"
          - "Source: {{ shared_materials_source }}"
          - "Destination: {{ shared_materials_destination }}"
          - "Owner: {{ shared_materials_owner }}"
      changed_when: false

# -----------------------------------------------------------------------------
# Notes
#
# - Only place files intended for students inside shared_materials/.
# - The source and destination are configured in config/lab_settings.yml.
# - Do NOT store passwords, SSH keys, or confidential information there.
# - Existing files with the same name will be updated.
# - Files not present in shared_materials/ are NOT removed from the destination.
# - For large datasets, consider using synchronize (rsync) instead of copy.
# -----------------------------------------------------------------------------
