---
# =============================================================================
# Playbook: 11_grant_student_sudo.yml
# Project: Linux/Ubuntu Lab Management Toolkit
#
# Purpose:
#   Grant sudo/administrator privileges to the classroom student account on
#   selected Ubuntu lab computers.
#
# Typical use cases:
#   - Temporary professor-approved exception.
#   - Rollback after running 10_revoke_student_sudo.yml.
#   - Allowing one selected student PC to perform administrative work during
#     controlled maintenance or testing.
#
# Security model:
#   - labadmin:
#       Administrator account used by Ansible/professor.
#       Should normally keep sudo access.
#
#   - student/student123:
#       Classroom account used by students.
#       Normally should NOT have sudo access, except when the professor
#       intentionally grants it.
#
# What this playbook does:
#   - Verifies the configured student user exists.
#   - Adds the student user to the sudo group.
#   - Preserves all existing groups using append: true.
#   - Verifies that sudo was granted.
#   - Prints before/after group membership.
#
# What this playbook does NOT do:
#   - Does NOT delete users.
#   - Does NOT change passwords.
#   - Does NOT remove any groups.
#   - Does NOT modify student files.
#   - Does NOT reboot the computer.
#   - Does NOT make the sudo access temporary automatically.
#
# Safety:
#   - Granting sudo gives administrator power.
#   - A student with sudo can install/remove software, change system settings,
#     create users, modify networking, and damage the system.
#   - Use this only on selected PCs when the professor explicitly wants it.
#   - After the temporary need is finished, run 10_revoke_student_sudo.yml.
#
# Recommended workflow:
#   1. Grant sudo on one selected PC:
#
#      ansible-playbook -i inventory.ini \
#        playbooks/11_grant_student_sudo.yml \
#        --limit pc1 -u labadmin --ask-become-pass
#
#   2. Verify:
#
#      ansible-playbook -i inventory.ini \
#        playbooks/09_check_user_privileges.yml \
#        --limit pc1 -u labadmin
#
#   3. Revoke again when finished:
#
#      ansible-playbook -i inventory.ini \
#        playbooks/10_revoke_student_sudo.yml \
#        --limit pc1 -u labadmin --ask-become-pass
# =============================================================================

- name: Grant sudo to classroom student account
  hosts: students
  become: true
  gather_facts: false

  vars_files:
    - ../config/lab_settings.yml

  vars:
    effective_lab_admin_user: "{{ lab_admin_user | default('labadmin', true) | trim }}"
    effective_student_user: >-
      {{
        lab_student_user
        | default(lab_student_user_default | default(ansible_user | default('', true), true), true)
        | trim
      }}
    effective_sudo_group_name: "{{ sudo_group_name | default('sudo', true) | trim }}"

  pre_tasks:
    - name: Identify actual Ansible connection user
      ansible.builtin.command:
        argv:
          - whoami
      become: false
      register: connection_user
      changed_when: false

    - name: Validate grant configuration
      ansible.builtin.assert:
        that:
          - effective_student_user | length > 0
          - effective_student_user != 'root'
          - effective_student_user is match('^[a-z_][a-z0-9_-]*[$]?$')
          - effective_sudo_group_name | length > 0
          - effective_sudo_group_name is match('^[a-z_][a-z0-9_-]*[$]?$')
        fail_msg: >-
          Unsafe grant configuration. The student user must be a valid,
          non-root Linux username, and sudo_group_name must be valid.
      changed_when: false

    - name: Warn when granting sudo to lab administrator user
      ansible.builtin.debug:
        msg:
          - "NOTICE: The configured student user is the same as lab administrator user."
          - "This is unusual. Normally labadmin and student accounts should be separate."
      when: effective_student_user == effective_lab_admin_user
      changed_when: false

    - name: Verify sudo group exists
      ansible.builtin.command:
        argv:
          - getent
          - group
          - "{{ effective_sudo_group_name }}"
      register: sudo_group_lookup
      changed_when: false
      failed_when: false

    - name: Stop if sudo group does not exist
      ansible.builtin.assert:
        that:
          - sudo_group_lookup.rc == 0
        fail_msg: >-
          The sudo group '{{ effective_sudo_group_name }}' does not exist on
          {{ inventory_hostname }}. This playbook expects Ubuntu-style sudo
          group administration.
      changed_when: false

    - name: Verify student account exists
      ansible.builtin.command:
        argv:
          - id
          - "{{ effective_student_user }}"
      register: student_id
      changed_when: false
      failed_when: false

    - name: Stop if student account is missing
      ansible.builtin.assert:
        that:
          - student_id.rc == 0
        fail_msg: >-
          The configured student account '{{ effective_student_user }}' does
          not exist on {{ inventory_hostname }}. Check lab_student_user in
          inventory.ini or lab_student_user_default in config/lab_settings.yml.
      changed_when: false

    - name: Read student groups before grant
      ansible.builtin.command:
        argv:
          - id
          - -nG
          - "{{ effective_student_user }}"
      register: student_groups_before
      changed_when: false

    - name: Determine whether student already has sudo
      ansible.builtin.set_fact:
        student_had_sudo_before: >-
          {{ effective_sudo_group_name in student_groups_before.stdout.split() }}
      changed_when: false

    - name: Display administrator-power warning
      ansible.builtin.debug:
        msg:
          - "WARNING: This playbook grants administrator/sudo privileges."
          - "Host: {{ inventory_hostname }}"
          - "Student user: {{ effective_student_user }}"
          - "Current groups: {{ student_groups_before.stdout }}"
          - "After this playbook, the student user may be able to install software, remove packages, change system settings, and modify administrator-level configuration."
          - "Use this only with professor approval and revoke sudo again when finished."
      changed_when: false

  tasks:
    - name: Add student to sudo group
      ansible.builtin.user:
        name: "{{ effective_student_user }}"
        groups: "{{ effective_sudo_group_name }}"
        append: true
      register: grant_result

    - name: Read student groups after grant
      ansible.builtin.command:
        argv:
          - id
          - -nG
          - "{{ effective_student_user }}"
      register: student_groups_after
      changed_when: false

    - name: Verify sudo was granted to student account
      ansible.builtin.assert:
        that:
          - effective_sudo_group_name in student_groups_after.stdout.split()
        fail_msg: >-
          The student account '{{ effective_student_user }}' still does not
          appear in the '{{ effective_sudo_group_name }}' group. Recheck user
          and group configuration.
      changed_when: false

    - name: Display grant summary
      ansible.builtin.debug:
        msg:
          - "Student sudo grant completed."
          - "Host: {{ inventory_hostname }}"
          - "Ansible connection user: {{ connection_user.stdout }}"
          - "Student user: {{ effective_student_user }}"
          - "Student groups before: {{ student_groups_before.stdout }}"
          - "Student groups after: {{ student_groups_after.stdout }}"
          - "Student had sudo before: {{ student_had_sudo_before }}"
          - >-
            {{
              'No change needed; the student account already had sudo.'
              if student_had_sudo_before
              else 'Sudo was granted to the student account.'
            }}
          - "WARNING: {{ effective_student_user }} now has administrator power."
          - "Recommendation: revoke sudo again with 10_revoke_student_sudo.yml when the temporary need is finished."
      changed_when: false

# -----------------------------------------------------------------------------
# Notes
#
# This playbook is the controlled rollback/exception mechanism for the student
# privilege-management workflow.
#
# Use it when the professor intentionally wants to give sudo back to a selected
# student account on one PC or a selected group of PCs.
#
# It does not make the privilege temporary automatically. To remove sudo again,
# run:
#
#   ansible-playbook -i inventory.ini \
#     playbooks/10_revoke_student_sudo.yml \
#     --limit pc1 -u labadmin --ask-become-pass
#
# Safe scaling:
#
#   Test on one PC first. Granting sudo to the full lab should only be done
#   when the professor explicitly wants all selected student accounts to have
#   administrator privileges.
# -----------------------------------------------------------------------------