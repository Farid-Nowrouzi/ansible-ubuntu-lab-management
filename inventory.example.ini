# =============================================================================
# File: inventory.example.ini
# Project: Linux/Ubuntu Lab Management Toolkit
#
# Purpose:
#   Example Ansible inventory file for managing Ubuntu student lab computers.
#
# Important:
#   - Copy this file to inventory.ini before real use.
#   - Keep inventory.ini private.
#   - Do NOT commit real IP addresses, passwords, or sensitive lab details.
#
# Security model:
#   ansible_user:
#     The administrator account Ansible connects with.
#     Recommended value after hardening: labadmin
#
#   lab_student_user:
#     The limited classroom account used by students.
#     This is the account that can have sudo revoked and auto-login configured.
#
# Example:
#   pc01 ansible_host=192.168.1.101 ansible_user=labadmin lab_student_user=student123
#
# Meaning:
#   - Ansible connects to pc01 as labadmin.
#   - Student-facing tasks target student123.
#   - Auto-login, shared materials, and privilege checks use student123.
# =============================================================================

[students]

# ---------------------------------------------------------------------------
# Example student PCs
#
# Replace the example IP addresses with the real lab IP addresses in inventory.ini.
# Use hostnames that match your lab naming style, for example pc1/pc2 or pc01/pc02.
# Keep the naming consistent across documentation, commands, and the menu.
# ---------------------------------------------------------------------------

pc01 ansible_host=192.168.1.101 ansible_user=labadmin lab_student_user=student123
pc02 ansible_host=192.168.1.102 ansible_user=labadmin lab_student_user=student123

# More examples:
# pc03 ansible_host=192.168.1.103 ansible_user=labadmin lab_student_user=student123
# pc04 ansible_host=192.168.1.104 ansible_user=labadmin lab_student_user=student123


[students:vars]

# Python interpreter used by Ansible on Ubuntu student PCs.
ansible_python_interpreter=/usr/bin/python3

# Optional SSH behavior.
# Uncomment only if needed in the lab.
#
# ansible_ssh_common_args='-o StrictHostKeyChecking=accept-new'

# Optional privilege escalation settings.
# Usually these are not required because playbooks use become: true where needed.
#
# ansible_become=true
# ansible_become_method=sudo